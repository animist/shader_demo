<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c0e12">
<title>E · デジタル・グリッチ</title>
</head><body>
<script type="module">
import { mount, singlePass } from '../engine.js';
const frag = `
uniform float uTime; uniform vec2 uResolution; uniform vec2 uTilt;
uniform float uRows, uShift, uChroma, uScan, uPlasma; uniform vec3 uTint;
varying vec2 vUv;
float rand(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233))) * 43758.5453); }
float noise(vec2 p){ vec2 i=floor(p), f=fract(p);
  float a=rand(i), b=rand(i+vec2(1,0)), c=rand(i+vec2(0,1)), d=rand(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
vec3 scene(vec2 uv){
  float v = sin(uv.x*10.0*uPlasma + uTime)
          + sin(uv.y*12.0*uPlasma - uTime*1.3)
          + sin((uv.x+uv.y)*8.0*uPlasma + uTime*0.7);
  vec3 col = 0.5 + 0.5*cos(6.28318*(v*0.15 + uTime*0.05 + uTint));
  vec2 g = abs(fract(uv*8.0) - 0.5);
  col += smoothstep(0.45, 0.5, max(g.x, g.y)) * 0.3;
  return col;
}
void main(){
  vec2 uv = gl_FragCoord.xy / uResolution.xy;
  float tilt = length(uTilt);
  float tSlow = mod(floor(uTime*8.0), 512.0);
  float tSlow2 = mod(floor(uTime*5.0), 512.0);

  float row = floor(uv.y * uRows);
  float glitchRow = step(0.7, noise(vec2(row, tSlow)));
  float shift = (noise(vec2(row*1.7, tSlow2)) - 0.5) * (0.08 + 0.45*tilt) * glitchRow * uShift;
  vec2 guv = uv; guv.x += shift;

  float sp = (0.004 + 0.03*tilt + 0.01*glitchRow) * uChroma;
  vec3 col;
  col.r = scene(guv + vec2(sp, 0.0)).r;
  col.g = scene(guv).g;
  col.b = scene(guv - vec2(sp, 0.0)).b;

  float roll = fract(uv.y - uTime*0.2);
  col += smoothstep(0.0, 0.08, roll) * (1.0 - smoothstep(0.2, 0.28, roll)) * 0.18;

  col *= (1.0 - uScan) + uScan*(0.5 + 0.5*sin(uv.y * uResolution.y * 1.5));
  col += step(0.93, noise(vec2(mod(floor(uTime*10.0),512.0), 7.0))) * tilt * 0.35;
  gl_FragColor = vec4(col, 1.0);
}`;
const PARAMS = [
  { key:'rows', uniform:'uRows',   label:'割れの粗さ(行数)', type:'range', min:4, max:80, step:1, value:24 },
  { key:'sft',  uniform:'uShift',  label:'横ズレ量',       type:'range', min:0.0, max:3.0, step:0.1, value:1.0 },
  { key:'chr',  uniform:'uChroma', label:'色収差',         type:'range', min:0.0, max:4.0, step:0.1, value:1.0 },
  { key:'scn',  uniform:'uScan',   label:'走査線',         type:'range', min:0.0, max:1.0, step:0.02, value:0.36 },
  { key:'pla',  uniform:'uPlasma', label:'プラズマ周波数', type:'range', min:0.3, max:3.0, step:0.1, value:1.0 },
  { key:'tint', uniform:'uTint',   label:'パレット',       type:'color', value:'#0054a8' },
];
mount(singlePass(frag, { title:'E 調整', params: PARAMS }),
  { title:'E · デジタル・グリッチ', subtitle:'合成・サイバー / ⚙ で調整・URL保存' });
</script>
</body></html>
