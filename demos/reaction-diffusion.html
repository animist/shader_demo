<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c0e12">
<title>B · 生命の模様 / 反応拡散</title>
</head><body>
<script type="module">
import { mount, paramPanel, PRECISION, VERT_FULLSCREEN, Program, Mesh, Triangle, RenderTarget, Vec2 } from '../engine.js';

// Gray-Scott 反応拡散（feed/kill 等を外部パラメータ化して探索できる）
const SEED = `
varying vec2 vUv;
float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
void main(){
  float B = 0.0;
  if(hash(floor(vUv*10.0)) > 0.93) B = 1.0;
  if(distance(vUv, vec2(0.5)) < 0.04) B = 1.0;
  gl_FragColor = vec4(1.0, B, 0.0, 1.0);
}`;
const SIM = `
uniform sampler2D uState; uniform vec2 uTexel; uniform vec2 uTilt;
uniform float uFeed; uniform float uKill; uniform float uBrush;
uniform float uSeedRate; uniform float uSeed;
varying vec2 vUv;
vec2 S(vec2 o){ return texture2D(uState, vUv + o*uTexel).xy; }
float h21(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
void main(){
  vec2 c = texture2D(uState, vUv).xy;
  vec2 lap = 0.2*(S(vec2(1,0)) + S(vec2(-1,0)) + S(vec2(0,1)) + S(vec2(0,-1)))
           + 0.05*(S(vec2(1,1)) + S(vec2(-1,1)) + S(vec2(1,-1)) + S(vec2(-1,-1)))
           - 1.0*c;
  float A = c.x, B = c.y;
  float Da = 1.0, Db = 0.5;
  float reaction = A*B*B;
  float A2 = A + (Da*lap.x - reaction + uFeed*(1.0 - A));
  float B2 = B + (Db*lap.y + reaction - (uKill + uFeed)*B);
  vec2 bp = vec2(0.5) + uTilt*0.4;
  if(distance(vUv, bp) < uBrush) B2 = 1.0;   // 傾きで動く筆
  if(h21(floor(vUv*200.0) + floor(uSeed*3.0)) > 1.0 - uSeedRate) B2 = 1.0;  // 種まき（枯渇防止）
  gl_FragColor = vec4(clamp(A2,0.0,1.0), clamp(B2,0.0,1.0), 0.0, 1.0);
}`;
const DISP = `
uniform sampler2D uState; uniform vec3 uColLo; uniform vec3 uColHi; varying vec2 vUv;
void main(){
  float B = texture2D(uState, vUv).y;
  float v = smoothstep(0.0, 0.35, B);
  vec3 col = mix(uColLo, uColHi, v);
  col += smoothstep(0.25, 0.5, B) * vec3(0.45, 0.1, 0.6);
  gl_FragColor = vec4(col, 1.0);
}`;

function hexToRGB(h){ h = h.replace('#',''); return [parseInt(h.substr(0,2),16)/255, parseInt(h.substr(2,2),16)/255, parseInt(h.substr(4,2),16)/255]; }

let panel, st;   // paramPanel と demo state（presets/reseed から参照）
function applyPreset(f, k, seed){ panel.set('feed', f); panel.set('kill', k); panel.set('seed', seed || 0); }
function reseed(){ if(st) st.seeded = false; }

const PARAMS = [
  { key:'feed',  label:'feed (供給)',        type:'range', min:0.010, max:0.090, step:0.0005, value:0.055 },
  { key:'kill',  label:'kill (除去)',        type:'range', min:0.040, max:0.070, step:0.0005, value:0.062 },
  { key:'steps', label:'成長スピード',        type:'range', min:1, max:16, step:1, value:8 },
  { key:'brush', label:'筆の太さ',            type:'range', min:0.005, max:0.060, step:0.001, value:0.02 },
  { key:'seed',  label:'種まき率(枯渇防止)',  type:'range', min:0.0, max:0.01, step:0.0005, value:0.0 },
  { key:'scale', label:'模様の粗さ(粗→細)',   type:'range', min:0.25, max:1.0, step:0.05, value:0.5 },
  { key:'colLo', label:'地の色',              type:'color', value:'#08111a' },
  { key:'colHi', label:'模様の色',            type:'color', value:'#2ee6c8' },
  { type:'button', label:'プリセット: サンゴ', onClick:()=>applyPreset(0.055, 0.062) },
  { type:'button', label:'プリセット: 分裂',   onClick:()=>applyPreset(0.0367, 0.0649, 0.002) },
  { type:'button', label:'プリセット: 迷路',   onClick:()=>applyPreset(0.029, 0.057) },
  { type:'button', label:'プリセット: 水玉',   onClick:()=>applyPreset(0.025, 0.060) },
  { type:'button', label:'リセット（再シード）', onClick:()=>reseed() },
];

function rebuild(s){
  const sw = Math.max(2, Math.floor(s.bufW * s.scale)), sh = Math.max(2, Math.floor(s.bufH * s.scale));
  const opt = { width:sw, height:sh, type:s.gl.HALF_FLOAT, internalFormat:s.gl.RGBA16F,
    format:s.gl.RGBA, minFilter:s.gl.NEAREST, magFilter:s.gl.NEAREST, depth:false };
  s.rts = [ new RenderTarget(s.gl, opt), new RenderTarget(s.gl, opt) ];
  s.sim.uniforms.uTexel.value.set(1/sw, 1/sh);
  s.seeded = false;
}

mount({
  init(gl){
    gl.getExtension('EXT_color_buffer_float');
    const geo = new Triangle(gl);
    const sim = new Program(gl, { vertex: VERT_FULLSCREEN, fragment: PRECISION + SIM, uniforms: {
      uState:{value:null}, uTexel:{value:new Vec2(1,1)}, uTilt:{value:new Vec2(0,0)},
      uFeed:{value:0.055}, uKill:{value:0.062}, uBrush:{value:0.02}, uSeedRate:{value:0.0}, uSeed:{value:0.0} }});
    const seed = new Program(gl, { vertex: VERT_FULLSCREEN, fragment: PRECISION + SEED, uniforms: {} });
    const disp = new Program(gl, { vertex: VERT_FULLSCREEN, fragment: PRECISION + DISP, uniforms: {
      uState:{value:null}, uColLo:{value:[0.03,0.07,0.10]}, uColHi:{value:[0.18,0.9,0.78]} }});
    st = { gl, geo, sim, seed, disp,
      seedMesh: new Mesh(gl,{geometry:geo, program:seed}),
      simMesh:  new Mesh(gl,{geometry:geo, program:sim}),
      dispMesh: new Mesh(gl,{geometry:geo, program:disp}),
      rts:[null,null], read:0, seeded:false, steps:8, scale:0.5, bufW:2, bufH:2 };

    panel = paramPanel(PARAMS, { title:'B 調整', onChange:(k, v) => {
      if(k === 'feed')       st.sim.uniforms.uFeed.value = v;
      else if(k === 'kill')  st.sim.uniforms.uKill.value = v;
      else if(k === 'brush') st.sim.uniforms.uBrush.value = v;
      else if(k === 'seed')  st.sim.uniforms.uSeedRate.value = v;
      else if(k === 'steps') st.steps = Math.round(v);
      else if(k === 'scale'){ st.scale = v; rebuild(st); }
      else if(k === 'colLo') st.disp.uniforms.uColLo.value = hexToRGB(v);
      else if(k === 'colHi') st.disp.uniforms.uColHi.value = hexToRGB(v);
    }});
    return st;
  },
  resize(s, w, h){ s.bufW = w; s.bufH = h; rebuild(s); },
  draw(s, f){
    if(!s.seeded){
      f.renderer.render({ scene: s.seedMesh, target: s.rts[0] });
      f.renderer.render({ scene: s.seedMesh, target: s.rts[1] });
      s.read = 0; s.seeded = true;
    }
    s.sim.uniforms.uTilt.value.set(f.tiltX, f.tiltY);
    s.sim.uniforms.uSeed.value = f.t;
    for(let k = 0; k < s.steps; k++){
      s.sim.uniforms.uState.value = s.rts[s.read].texture;
      f.renderer.render({ scene: s.simMesh, target: s.rts[s.read ^ 1] });
      s.read ^= 1;
    }
    s.disp.uniforms.uState.value = s.rts[s.read].texture;
    f.renderer.render({ scene: s.dispMesh });
  },
}, { title:'B · 生命の模様 / 反応拡散', subtitle:'⚙ ボタンで feed/kill 等を調整・URLに保存' });
</script>
</body></html>
