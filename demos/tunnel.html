<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c0e12">
<title>C · トンネル飛行</title>
</head><body>
<script type="module">
import { mount, singlePass } from '../engine.js';
const frag = `
uniform float uTime; uniform vec2 uResolution; uniform vec2 uTilt;
uniform float uSpeed, uSteer, uWall, uBands, uHole; uniform vec3 uTint;
varying vec2 vUv;
float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float noise(vec2 p){ vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - uResolution) / uResolution.y;
  uv += uTilt*uSteer;
  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float depth = 1.0 / (r + 0.06) + uTime*uSpeed;

  // 角度を周期的に扱い、左の継ぎ目（atanの折り返し）を消す
  vec2 circ = vec2(cos(a), sin(a));            // a=±π で必ず一致＝継ぎ目なし
  float cycles = floor(4.0 + uWall*8.0);       // 縞の周回数を整数化＝一周でピッタリ閉じる
  float wall = noise(circ * (1.5*uWall) + vec2(0.0, depth*1.5*uWall)) * 0.6
             + 0.4 * (sin(a*cycles + depth*5.0*uWall) * 0.5 + 0.5);

  float bands = sin(depth*uBands)*0.5 + 0.5;
  vec3 col = 0.5 + 0.5*cos(6.28318*(depth*0.08 + uTint));
  col *= 0.35 + 0.65*wall;
  col *= 0.5 + 0.5*bands;
  col *= smoothstep(0.0, uHole, r);            // 奥の黒丸（径 = uHole）
  gl_FragColor = vec4(col, 1.0);
}`;
const PARAMS = [
  { key:'spd',  uniform:'uSpeed', label:'飛行スピード', type:'range', min:0.0, max:2.0, step:0.05, value:0.6 },
  { key:'str',  uniform:'uSteer', label:'操舵の効き',   type:'range', min:0.0, max:1.5, step:0.05, value:0.35 },
  { key:'wall', uniform:'uWall',  label:'壁模様の細かさ', type:'range', min:0.3, max:3.0, step:0.1, value:1.0 },
  { key:'band', uniform:'uBands', label:'リング間隔',   type:'range', min:0.0, max:10.0, step:0.2, value:3.0 },
  { key:'hole', uniform:'uHole',  label:'奥の黒丸サイズ', type:'range', min:0.1, max:1.5, step:0.05, value:0.5 },
  { key:'tint', uniform:'uTint',  label:'パレット',     type:'color', value:'#0066bf' },
];
mount(singlePass(frag, { title:'C 調整', params: PARAMS }),
  { title:'C · トンネル飛行', subtitle:'没入・奥行き / ⚙ で調整・URL保存' });
</script>
</body></html>
