<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>繊維フィールド（近似版）</title>
</head><body>
<script type="module">
import { mount, singlePass } from '../engine.js';

// 純フラグメントで「密な繊維の塊」風を擬似生成（本物の枝のつながりは持たない）。
const frag = `
uniform float uTime; uniform vec2 uResolution; uniform vec2 uTilt;
uniform float uScale, uFreq, uWarp, uAlpha, uTiltK; uniform vec3 uColor;
varying vec2 vUv;
float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float noise(vec2 p){ vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
float fbm(vec2 p){ float v=0.0,a=0.5; mat2 r=mat2(0.8,0.6,-0.6,0.8);
  for(int i=0;i<5;i++){ v+=a*noise(p); p=r*p*2.0; a*=0.5; } return v; }
float fibField(vec2 p){                       // domain warp した場でうねる繊維
  vec2 q = vec2(fbm(p), fbm(p + 5.2));
  return fbm(p + uWarp*q);
}
void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - uResolution) / uResolution.y;
  uv += uTilt*uTiltK;
  float v = fibField(uv*uScale + uTime*0.05);
  float lines = abs(fract(v*uFreq) - 0.5) * 2.0;
  float fil = smoothstep(0.16, 0.0, lines);   // 細い繊維
  float r = length(uv*vec2(1.05, 0.8));        // 卵形ブロブ
  float edge = fbm(uv*2.5 + 10.0);
  float mask = smoothstep(0.9 + edge*0.25, 0.15, r);  // 中心密・縁ほつれ
  vec3 col = uColor * fil * mask * uAlpha;
  gl_FragColor = vec4(col, 1.0);
}`;
const PARAMS = [
  { key:'scale', uniform:'uScale', label:'繊維の大きさ', type:'range', min:1.0, max:8.0, step:0.1, value:3.0 },
  { key:'freq',  uniform:'uFreq',  label:'繊維の密度',   type:'range', min:4, max:40, step:1, value:16 },
  { key:'warp',  uniform:'uWarp',  label:'うねり',       type:'range', min:0.0, max:3.0, step:0.05, value:1.4 },
  { key:'alpha', uniform:'uAlpha', label:'明るさ',       type:'range', min:0.5, max:3.0, step:0.05, value:1.5 },
  { key:'tilt',  uniform:'uTiltK', label:'傾き感度',     type:'range', min:0.0, max:2.0, step:0.05, value:0.6 },
  { key:'color', uniform:'uColor', label:'色',           type:'color', value:'#1faf5a' },
];
mount(singlePass(frag, { title:'繊維調整', params: PARAMS }),
  { title:'繊維フィールド（近似版）', subtitle:'フラグメントで繊維塊を擬似生成 / ⚙ 調整・URL保存' });
</script>
</body></html>
