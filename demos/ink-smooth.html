<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c0e12">
<title>v2 · 格子低減版</title>
</head><body>
<script type="module">
import { mount, singlePass } from '../engine.js';

// v2: hash=iq系 / noise=quintic / fbm=オクターブ回転（縦横グリッド低減）
const frag = `
uniform float uTime; uniform vec2 uResolution; uniform vec2 uTilt;
uniform float uWarp, uSpeed, uTiltK, uInk, uGlow; uniform vec3 uBase, uTint;
varying vec2 vUv;
float hash(vec2 p){ p=50.0*fract(p*0.3183099 + vec2(0.71,0.113)); return fract(p.x*p.y*(p.x+p.y)); }
float noise(vec2 p){ vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
  vec2 u=f*f*f*(f*(f*6.0-15.0)+10.0); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
float fbm(vec2 p){ float v=0.0, a=0.5; mat2 rot=mat2(0.80,0.60,-0.60,0.80);
  for(int i=0;i<5;i++){ v+=a*noise(p); p=rot*p*2.0; a*=0.5; } return v; }
vec3 pal(float t){ return 0.5 + 0.5*cos(6.28318*(t + uTint)); }
void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - uResolution) / uResolution.y;
  float t = uTime * uSpeed;
  vec2 q = vec2( fbm(uv + t), fbm(uv + vec2(5.2,1.3) - t) );
  vec2 r = vec2( fbm(uv + uWarp*q + uTilt*uTiltK + vec2(1.7,9.2) + 0.15*t),
                 fbm(uv + uWarp*q + uTilt*uTiltK + vec2(8.3,2.8) - 0.12*t) );
  float f = fbm(uv + (uWarp*1.25)*r + uTilt*(uTiltK*0.5));
  vec3 inkCol = pal(f*0.6 + length(r)*0.35 + t*0.1);
  vec3 col = mix(uBase, inkCol, smoothstep(uInk, 0.9, f));
  float edge = pow(1.0 - abs(f - 0.55)*2.0, 3.0);
  col += uGlow * edge * inkCol;
  float vig = 1.0 - 0.35*dot(uv*0.7, uv*0.7);
  col *= clamp(vig, 0.0, 1.0);
  gl_FragColor = vec4(col, 1.0);
}`;

const PARAMS = [
  { key:'warp',  uniform:'uWarp',  label:'うねり強度',   type:'range', min:0.5, max:3.0, step:0.05, value:1.6 },
  { key:'speed', uniform:'uSpeed', label:'時間スピード', type:'range', min:0.0, max:0.2, step:0.005, value:0.06 },
  { key:'tilt',  uniform:'uTiltK', label:'傾き感度',     type:'range', min:0.0, max:2.0, step:0.05, value:0.9 },
  { key:'ink',   uniform:'uInk',   label:'インクの広がり', type:'range', min:0.0, max:0.6, step:0.01, value:0.25 },
  { key:'glow',  uniform:'uGlow',  label:'縁の発光',     type:'range', min:0.0, max:0.6, step:0.01, value:0.18 },
  { key:'base',  uniform:'uBase',  label:'地の色',       type:'color', value:'#090b0f' },
  { key:'tint',  uniform:'uTint',  label:'パレット',     type:'color', value:'#8c6b4d' },
];

mount(singlePass(frag, { title:'インク 調整', params: PARAMS }),
  { title:'v2 格子低減版', subtitle:'quintic+回転+hash改良 / ⚙ で調整・URL保存' });
</script>
</body></html>
