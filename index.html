<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0e12">
<title>Shader Demo 一覧</title>
<style>
  :root{--bg:#0c0e12;--ink:#e8eaf0;--muted:#9aa3b2;--line:#262b35}
  *{box-sizing:border-box}
  body{margin:0;background:
    radial-gradient(1000px 700px at 80% -10%,#16203a 0%,transparent 55%),
    radial-gradient(800px 600px at 0% 110%,#2a1430 0%,transparent 50%),var(--bg);
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:36px 18px 60px}
  .kick{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#3fd6c2;font-weight:700}
  h1{font-size:24px;margin:.3em 0 .2em;font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  a.card{display:block;text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;background:#14171d;transition:.15s}
  a.card:active{transform:scale(.98)}
  .thumb{height:96px;position:relative}
  .cat{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;color:#06120f;background:rgba(255,255,255,.85);
    border-radius:20px;padding:2px 8px}
  .meta{padding:11px 13px}
  .meta .t{font-weight:800;font-size:15px}
  .meta .d{color:var(--muted);font-size:12.5px;margin-top:2px;line-height:1.5}
</style>
</head><body>
<div class="wrap">
  <div class="kick">shader_demo</div>
  <h1>Shader デモ 一覧</h1>
  <div class="sub">各カードをタップで個別に開けます。HUDで FPS / 解像度 / 傾き、下部ボタンで 30fps上限・解像度スケール。右上「⚙」でパラメータ調整（値はURLに保存）。スマホはまず「タップして開始」でジャイロ許可を。</div>
  <a href="learn.html" style="display:inline-block;margin:0 0 18px;color:#3fd6c2;font-weight:700;font-size:14px;text-decoration:none;border:1px solid #2a6e66;border-radius:999px;padding:8px 14px">📖 学習ノート：Shaderとは何か →</a>
  <div class="grid" id="grid"></div>
</div>
<script type="module">
import { DEMOS } from './demos.js';
const grid = document.getElementById('grid');
grid.innerHTML = DEMOS.map(d => `
  <a class="card" href="demos/${d.file}.html">
    <div class="thumb" style="background:${d.thumb}"><span class="cat">${d.cat}</span></div>
    <div class="meta"><div class="t">${d.title}</div><div class="d">${d.desc}</div></div>
  </a>`).join('');
</script>
</body></html>
